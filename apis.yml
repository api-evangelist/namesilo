apis:
  - aid: namesilo:namesilo
    name: NameSilo Domain API
    description: >-
      The NameSilo Domain API allows developers to search, register, transfer,
      renew, and manage domains programmatically. All API calls use HTTPS GET
      requests and return XML or JSON. A sandbox environment is available for
      testing.
